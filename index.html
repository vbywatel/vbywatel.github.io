<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>mObywatel</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    
    <link rel="manifest" href="manifest.json">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
        }

        /* Twój GIF na cały ekran */
        #custom-splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999999;
        }

        #custom-splash img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Wypełnia cały ekran */
        }
    </style>
</head>
<body>

    <div id="custom-splash">
        <img src="assets/quebo-quebonafide.gif" alt="Ładowanie...">
    </div>

    <script>
        // Rejestracja Service Workera (wymagane dla PWA)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(function(err) {
                console.log("Błąd Service Workera: ", err);
            });
        }

        window.addEventListener('load', function() {
            // Czekamy 3 sekundy na animację Quebo
            setTimeout(function() {
                // Przekierowanie do właściwej treści
                window.location.href = "id.html";
            }, 3000); 
        });
    </script>

</body>
</html>
