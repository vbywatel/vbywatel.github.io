<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>mObywatel</title>
    <link rel="manifest" href="data:application/manifest+json;base64,eyJuYW1lIjoibU9ieXdhdGVsIiwic2hvcnRfbmFtZSI6Im1PYnl3YXRlbCIsInRoZW1lX2NvbG9yIjoiIzEwMTMxNyIsImJhY2tncm91bmRfY29sb3IiOiIjMTAxMzE3IiwiZGlzcGxheIjoic3RhbmRhbG9uZSIsInN0YXJ0X3VybCI6ImlkLmh0bWwifQ==">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="mObywatel">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#101317">
    <meta name="viewport" content="width=device-width, initial-scale=0.8, user-scalable=no, viewport-fit=cover">
    <meta name="format-detection" content="telephone=no">
    <link rel="stylesheet" href="assets/moreid.css">
    <link rel="stylesheet" href="assets/main.css">
    <link rel="icon" type="image/x-icon" href="https://i.imgur.com/U7TRg0V.png">
</head>
<body>
    <div class="top_grid">
        <div class="action_grid">
            <img src="https://i.imgur.com/aXIO2NG.png" class="back_img">
            <p onclick="window.history.back()" class="back_text">Wróć</p>
        </div>
        <p class="title_text">Dane&nbsp;dowodu&nbsp;osobistego</p>
        <img src="https://i.imgur.com/VHNv1TC.png" class="help_img">
    </div>

    <div class="card custom-card">
        <div class="field">
            <label>Seria i numer</label>
            <div class="value-copy">
                <b id="mdow_series" style="font-size:23px">ZZC 108201</b>
                <button class="value-copy">Kopiuj</button> 
            </div>
        </div>
        <div class="field">
            <label>Status</label>
            <div class="status_with_icon">
                <img src="https://i.imgur.com/XYP33Vx.png" alt="Status Ikona" class="status_icon">
                <strong>Wydany</strong>
            </div>
        </div>
        
        <div class="field">
            <label>Data wydania</label>
            <strong id="organ_wyd">STAROSTA GMINY KIKÓŁ</strong>
        </div>

        <div class="field">
            <label>Termin ważności</label>
            <strong id="expiry_date">13.04.2032</strong>
        </div>
    
        <div class="field">
            <label>Data wydania</label>
            <strong id="issue_date">14.07.2022</strong>
        </div>
    </div>

    <div class="bottom_holder" style="height: 90px; margin-bottom: 12px;">
        <div class="bottom_update">
            <div class="bottom_update_grid">
                <p class="bottom_update_text">Ostatnia aktualizacja</p>
                <p class="bottom_update_value"></p>
            </div>
            <button class="main_button update">Aktualizuj</button>
        </div>
    </div>

    <div class="bottom_holderarrow">
        <div class="bottom_grid">
            <img class="phone" src="https://i.imgur.com/RbOXgIB.png" alt="Telefon">
            <p class="bottom_text">Zmień PIN do podpisu<br>osobistego</p>
            <img class="action_arrow" src="https://i.imgur.com/lTxuUMF.png" alt="Strzałka">
        </div>
    </div>

    <script src="assets/bar.js"></script>
    <script src="assets/card.js?v=1.0"></script>
    <script>
        // Ten skrypt robi dokładnie to samo co w card.html:
        // Pobiera parametry z URL i wstawia je do elementów o tych samych ID.
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            urlParams.forEach((value, key) => {
                const element = document.getElementById(key);
                if (element) {
                    element.innerText = value;
                }
            });
        })();
    </script>
</body>
</html>
